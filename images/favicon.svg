<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="dropGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FB8FF;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4FB8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FB8FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:transparent;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Black rounded box background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="#0a0a0a"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="#222" stroke-width="2"/>
  
  <!-- Drop shape - outer glow -->
  <path d="M256 60 C256 60 380 200 380 300 C380 380 326 440 256 440 C186 440 132 380 132 300 C132 200 256 60 256 60Z" 
        fill="url(#dropGradient)" opacity="0.3" transform="scale(1.05) translate(-13, -15)"/>
  
  <!-- Drop shape - main body -->
  <path d="M256 80 C256 80 370 210 370 305 C370 375 320 425 256 425 C192 425 142 375 142 305 C142 210 256 80 256 80Z" 
        fill="url(#innerGlow)"/>
  
  <!-- Inner dark core -->
  <path d="M256 120 C256 120 340 230 340 305 C340 355 302 395 256 395 C210 395 172 355 172 305 C172 230 256 120 256 120Z" 
        fill="#0d0d0d"/>
  
  <!-- Left highlight (blue) -->
  <path d="M200 180 C180 220 165 270 165 310 C165 350 185 380 210 395 C170 370 150 330 150 300 C150 250 175 200 200 180Z" 
        fill="#4FB8FF" opacity="0.6"/>
  
  <!-- Right highlight (yellow/orange) -->
  <path d="M312 180 C332 220 347 270 347 310 C347 350 327 380 302 395 C342 370 362 330 362 300 C362 250 337 200 312 180Z" 
        fill="#FFD93D" opacity="0.5"/>
  
  <!-- Top white reflection -->
  <ellipse cx="240" cy="200" rx="25" ry="40" fill="white" opacity="0.15" transform="rotate(-20, 240, 200)"/>
</svg>
